name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend assets
        run: |
          cd web
          chmod +x build-frontend.sh
          ./build-frontend.sh

      - name: Generate Custom Changelog
        run: |
          echo "## 🚀 What's New" > custom_changelog.md
          
          # Find latest tag safely
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "### 🖥️ Backend & API Changes" >> custom_changelog.md
            git log $PREV_TAG..HEAD --oneline --no-merges 2>/dev/null | sed 's/^/- /' >> custom_changelog.md || true
            
            # Submodule changes
            OLD_SUB_SHA=$(git rev-parse $PREV_TAG:web 2>/dev/null || echo "")
            NEW_SUB_SHA=$(git rev-parse HEAD:web 2>/dev/null || echo "")
            
            if [ -n "$OLD_SUB_SHA" ] && [ -n "$NEW_SUB_SHA" ] && [ "$OLD_SUB_SHA" != "$NEW_SUB_SHA" ]; then
              echo "" >> custom_changelog.md
              echo "### 🌐 Web Frontend Changes" >> custom_changelog.md
              cd web
              # Fetch origin history to ensure both SHAs exist in the checked out submodule
              git fetch origin $OLD_SUB_SHA $NEW_SUB_SHA --depth=50 2>/dev/null || git fetch origin 2>/dev/null || true
              git log $OLD_SUB_SHA..$NEW_SUB_SHA --oneline --no-merges 2>/dev/null | sed 's/^/- /' >> ../custom_changelog.md || echo "- Web updated from \`$OLD_SUB_SHA\` to \`$NEW_SUB_SHA\`" >> ../custom_changelog.md
              cd ..
            fi
          else
            echo "### 🖥️ Backend & API Changes" >> custom_changelog.md
            git log --oneline --no-merges 2>/dev/null | sed 's/^/- /' >> custom_changelog.md || true
            
            echo "" >> custom_changelog.md
            echo "### 🌐 Web Frontend Changes" >> custom_changelog.md
            cd web
            git log --oneline --no-merges -n 20 2>/dev/null | sed 's/^/- /' >> ../custom_changelog.md || true
            cd ..
          fi
          
          echo "" >> custom_changelog.md
          echo "---" >> custom_changelog.md
          echo "*Generated automatically during release build.*" >> custom_changelog.md

      - name: Run GoReleaser
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --parallelism 1 --skip=validate --release-notes=custom_changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_API_ID: ${{ secrets.DEFAULT_API_ID }}
          DEFAULT_API_HASH: ${{ secrets.DEFAULT_API_HASH }}

  docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            DEFAULT_API_ID=${{ secrets.DEFAULT_API_ID }}
            DEFAULT_API_HASH=${{ secrets.DEFAULT_API_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max